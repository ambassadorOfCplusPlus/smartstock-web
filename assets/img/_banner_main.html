<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:600px; }
  body { font-family: "Segoe UI", Arial, sans-serif; }
  .banner {
    width:1200px; height:600px; position:relative; overflow:hidden;
    background: radial-gradient(1300px 700px at 78% -15%, #3a2740 0%, #241a2e 50%, #16121d 100%);
    color:#f3eef7; padding:58px 64px;
  }
  .top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:36px; font-weight:800; letter-spacing:.5px; }
  .logo .a { color:#ff7a59; }
  .edition { font-size:15px; letter-spacing:4px; color:#b39fc4; font-weight:700; }
  h1 { margin-top:70px; font-size:50px; line-height:1.12; font-weight:800; max-width:1000px; }
  h1 .hl { color:#ff7a59; }
  .sub { margin-top:22px; font-size:22px; color:#c9bcd6; max-width:920px; }
  .eds { margin-top:46px; display:flex; gap:16px; }
  .ed { display:flex; align-items:center; gap:10px; background:#2e2440; border:1px solid #463655;
        border-radius:12px; padding:14px 20px; font-size:20px; font-weight:700; color:#efe7f5; }
  .ed .em { font-size:24px; }
  .ed .accent { color:#ff7a59; }
  .foot { position:absolute; right:64px; bottom:46px; font-size:15px; color:#9b8aac; }
</style></head><body>
  <div class="banner">
    <div class="top">
      <div class="logo">📦 Smart<span class="a">Stock</span></div>
      <div class="edition">СКЛАДСКАЯ ERP</div>
    </div>
    <h1>Склад, касса, маркировка<br>и маркетплейсы — <span class="hl">в одной системе</span></h1>
    <div class="sub">Под ваш масштаб: один компьютер, сеть точек или облако по подписке</div>
    <div class="eds">
      <div class="ed"><span class="em">🖥️</span> Desktop</div>
      <div class="ed"><span class="em">🌐</span> Server</div>
      <div class="ed"><span class="em">☁️</span> Облако <span class="accent">скоро</span></div>
    </div>
    <div class="foot">smartstock · от точки до сети</div>
  </div>
</body></html>
