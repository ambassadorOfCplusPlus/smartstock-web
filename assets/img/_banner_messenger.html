<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:600px; }
  body { font-family: "Segoe UI", Arial, sans-serif; }
  .banner {
    width:1200px; height:600px; position:relative; overflow:hidden;
    background: radial-gradient(1300px 700px at 80% -15%, #1c3b34 0%, #14271f 52%, #0f1a16 100%);
    color:#eef8f2; padding:58px 64px;
  }
  .top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:34px; font-weight:800; }
  .logo .a { color:#3ad29a; }
  .edition { font-size:15px; letter-spacing:3px; color:#9fd0bc; font-weight:700; }
  h1 { margin-top:74px; font-size:50px; line-height:1.13; font-weight:800; max-width:980px; }
  h1 .hl { color:#3ad29a; }
  .sub { margin-top:22px; font-size:21px; color:#bfe0d2; max-width:940px; }
  .feats { margin-top:42px; display:flex; gap:32px; font-size:19px; color:#d8f0e6; }
  .feats span:before { content:"🔒 "; }
  .foot { position:absolute; right:64px; bottom:48px; font-size:15px; color:#83aa98; }
</style></head><body>
  <div class="banner">
    <div class="top">
      <div class="logo">💬 Smart<span class="a">stack</span> Messenger</div>
      <div class="edition">SELF-HOSTED · E2E</div>
    </div>
    <h1>Свой мессенджер со<br><span class="hl">сквозным шифрованием</span></h1>
    <div class="sub">Сервер хранит только шифротекст — переписку и файлы не прочитает никто, включая владельца сервера</div>
    <div class="feats">
      <span>Сквозное шифрование</span><span>Свой сервер</span><span>Открытый код</span>
    </div>
    <div class="foot">smartstack · самостоятельный продукт</div>
  </div>
</body></html>
