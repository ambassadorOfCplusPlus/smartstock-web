<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2a28"/>
      <stop offset="1" stop-color="#201f1d"/>
    </linearGradient>
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3936"/>
      <stop offset="1" stop-color="#2e2d2b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#d97757"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- ── Левая часть: план склада (вид сверху, лёгкая изометрия) ────────────── -->
  <g transform="translate(70,150)">
    <!-- пол: ромбовидная площадка -->
    <polygon points="0,180 300,30 560,170 260,320" fill="#34332f" stroke="#4a4945" stroke-width="2"/>
    <!-- сетка пола -->
    <g stroke="#46453f" stroke-width="1" opacity="0.7">
      <line x1="75" y1="142" x2="335" y2="282"/>
      <line x1="150" y1="105" x2="410" y2="245"/>
      <line x1="225" y1="67" x2="485" y2="207"/>
      <line x1="75" y1="105" x2="335" y2="-5" opacity="0"/>
      <line x1="65" y1="150" x2="215" y2="68"/>
      <line x1="140" y1="187" x2="290" y2="105"/>
      <line x1="215" y1="225" x2="365" y2="143"/>
    </g>
    <!-- стеллажи (экструдированные коробки) -->
    <g>
      <polygon points="120,120 175,93 215,115 160,143" fill="#3f3e3a" stroke="#56554f" stroke-width="1.5"/>
      <polygon points="120,120 160,143 160,178 120,156" fill="#2c2b28" stroke="#56554f" stroke-width="1.5"/>
      <polygon points="160,143 215,115 215,150 160,178" fill="#373531" stroke="#56554f" stroke-width="1.5"/>

      <polygon points="250,160 305,133 345,155 290,183" fill="#3f3e3a" stroke="#56554f" stroke-width="1.5"/>
      <polygon points="250,160 290,183 290,218 250,196" fill="#2c2b28" stroke="#56554f" stroke-width="1.5"/>
      <polygon points="290,183 345,155 345,190 290,218" fill="#373531" stroke="#56554f" stroke-width="1.5"/>
    </g>
    <!-- целевой стеллаж (акцент) -->
    <g>
      <polygon points="360,95 415,68 455,90 400,118" fill="#d97757" stroke="#f0b59f" stroke-width="2"/>
      <polygon points="360,95 400,118 400,150 360,128" fill="#b85f43" stroke="#f0b59f" stroke-width="2"/>
      <polygon points="400,118 455,90 455,122 400,150" fill="#c96a4c" stroke="#f0b59f" stroke-width="2"/>
    </g>
    <!-- вход (зелёная точка) -->
    <circle cx="55" cy="195" r="11" fill="#2e7d32" stroke="#bfe6c1" stroke-width="2"/>
    <text x="55" y="232" fill="#bdbbb0" font-size="15" text-anchor="middle">вход</text>
    <!-- QR-якорь -->
    <g transform="translate(232,250)">
      <rect x="-13" y="-13" width="26" height="26" rx="3" fill="#f5f4ef"/>
      <g fill="#201f1d">
        <rect x="-9" y="-9" width="7" height="7"/><rect x="2" y="-9" width="7" height="7"/>
        <rect x="-9" y="2" width="7" height="7"/><rect x="3" y="3" width="4" height="4"/>
      </g>
    </g>
    <!-- маршрут к товару -->
    <polyline points="55,195 150,210 232,250 320,150 405,118" fill="none"
              stroke="#d97757" stroke-width="4" stroke-dasharray="9 7"
              stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  </g>

  <!-- ── Телефон с навигацией ──────────────────────────────────────────────── -->
  <g transform="translate(470,300)">
    <rect x="0" y="0" width="150" height="270" rx="22" fill="#16150f" stroke="#4a4945" stroke-width="3"/>
    <rect x="12" y="16" width="126" height="238" rx="12" fill="#26251f"/>
    <text x="75" y="44" fill="#bdbbb0" font-size="13" text-anchor="middle">до товара</text>
    <text x="75" y="76" fill="#f5f4ef" font-size="30" font-weight="700" text-anchor="middle">12 м</text>
    <!-- большая стрелка-направление -->
    <g transform="translate(75,150)">
      <circle r="46" fill="none" stroke="#3a3934" stroke-width="3"/>
      <path d="M0,-34 L24,28 L0,12 L-24,28 Z" fill="#d97757"/>
    </g>
    <text x="75" y="232" fill="#9c9a90" font-size="12" text-anchor="middle">ячейка A-12</text>
  </g>

  <!-- ── Правая часть: текст ───────────────────────────────────────────────── -->
  <g transform="translate(700,0)">
    <text x="0" y="180" fill="#d97757" font-size="26" font-weight="700">📦 SmartStock</text>
    <text x="0" y="248" fill="#f5f4ef" font-size="58" font-weight="800">Навигация</text>
    <text x="0" y="300" fill="#f5f4ef" font-size="58" font-weight="800">по складу</text>
    <text x="0" y="352" fill="#cfcdc3" font-size="26">«Доведи до товара» — без GPS</text>

    <!-- бейджи -->
    <g font-size="19" fill="#e9e7df">
      <g transform="translate(0,392)">
        <rect x="0" y="0" width="190" height="44" rx="22" fill="#34332f" stroke="#4a4945"/>
        <text x="95" y="29" text-anchor="middle">🔳 QR-якоря</text>
      </g>
      <g transform="translate(206,392)">
        <rect x="0" y="0" width="160" height="44" rx="22" fill="#34332f" stroke="#4a4945"/>
        <text x="80" y="29" text-anchor="middle">🧭 AR / PDR</text>
      </g>
      <g transform="translate(0,452)">
        <rect x="0" y="0" width="230" height="44" rx="22" fill="#34332f" stroke="#4a4945"/>
        <text x="115" y="29" text-anchor="middle">📱 APK + ПК-клиент</text>
      </g>
      <g transform="translate(246,452)">
        <rect x="0" y="0" width="160" height="44" rx="22" fill="#2e5e34" stroke="#3f7a47"/>
        <text x="80" y="29" text-anchor="middle">Открытый код</text>
      </g>
    </g>
  </g>
</svg>
