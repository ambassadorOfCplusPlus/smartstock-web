<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:600px; }
  body { font-family: "Segoe UI", Arial, sans-serif; }
  .banner {
    width:1200px; height:600px; position:relative; overflow:hidden;
    background: radial-gradient(1300px 700px at 80% -15%, #1e3a5f 0%, #15273f 52%, #0f1a2a 100%);
    color:#eef4fb; padding:58px 64px;
  }
  .top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:36px; font-weight:800; }
  .logo .a { color:#5bb8ff; }
  .edition { font-size:15px; letter-spacing:4px; color:#9fc2e0; font-weight:700; }
  .soon { background:#ffb020; color:#3a2600; font-weight:800; font-size:14px;
          padding:5px 12px; border-radius:20px; margin-left:12px; vertical-align:middle; }
  h1 { margin-top:74px; font-size:52px; line-height:1.12; font-weight:800; max-width:960px; }
  h1 .hl { color:#5bb8ff; }
  .sub { margin-top:22px; font-size:22px; color:#bcd2e8; max-width:900px; }
  .feats { margin-top:42px; display:flex; gap:34px; font-size:19px; color:#dceaf8; }
  .feats span:before { content:"✓ "; color:#36d399; font-weight:800; }
  .foot { position:absolute; right:64px; bottom:48px; font-size:15px; color:#88a4c2; }
</style></head><body>
  <div class="banner">
    <div class="top">
      <div class="logo">☁️ Smart<span class="a">Stock</span></div>
      <div class="edition">CLOUD EDITION</div>
    </div>
    <h1>Учёт по подписке —<br><span class="hl">прямо в браузере</span> <span class="soon">🚧 Скоро</span></h1>
    <div class="sub">Команда, склады, маркетплейсы и ИИ — с любого устройства, ничего не устанавливать</div>
    <div class="feats">
      <span>Работает в браузере</span><span>Команда и роли</span><span>Доступ откуда угодно</span>
    </div>
    <div class="foot">smartstock · облачная версия</div>
  </div>
</body></html>
