<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:600px; }
  body { font-family: "Segoe UI", Arial, sans-serif; }
  .banner {
    width:1200px; height:600px; position:relative; overflow:hidden;
    background: radial-gradient(1200px 600px at 80% -10%, #2f3e57 0%, #1b2230 55%, #141a24 100%);
    color:#eef2f8; padding:56px 64px;
  }
  .top { display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:34px; font-weight:800; letter-spacing:.5px; }
  .logo .a { color:#5b9cff; }
  .edition { font-size:15px; letter-spacing:3px; color:#9fb0c8; font-weight:700; }
  h1 { margin-top:78px; font-size:52px; line-height:1.12; font-weight:800; max-width:900px; }
  h1 .hl { color:#ff7a59; }
  .sub { margin-top:22px; font-size:22px; color:#b9c6da; max-width:880px; }
  .feats { margin-top:40px; display:flex; gap:34px; font-size:19px; color:#dbe6f5; }
  .feats span:before { content:"✓ "; color:#36d399; font-weight:800; }
  .badges { position:absolute; left:64px; bottom:54px; display:flex; gap:14px; }
  .badge { background:#5b9cff; color:#0c1422; font-weight:800; font-size:18px;
           padding:8px 16px; border-radius:10px; }
  .badge.alt { background:#2a3850; color:#cfe0f7; }
  .foot { position:absolute; right:64px; bottom:60px; font-size:15px; color:#8295ad; }
</style></head><body>
  <div class="banner">
    <div class="top">
      <div class="logo">📦 Smart<span class="a">Stock</span></div>
      <div class="edition">DESKTOP EDITION</div>
    </div>
    <h1>Склад, касса и маркировка —<br><span class="hl">в одной программе</span></h1>
    <div class="sub">Складская мини-ERP для розницы. Касса 54-ФЗ · «Честный знак» · партии</div>
    <div class="feats">
      <span>Бессрочная лицензия</span><span>Работает офлайн</span><span>Данные на вашем железе</span>
    </div>
    <div class="badges">
      <div class="badge">v2.5.0</div>
      <div class="badge alt">Windows</div>
      <div class="badge alt">270 автотестов</div>
    </div>
    <div class="foot">smartstock · ваше оборудование</div>
  </div>
</body></html>
